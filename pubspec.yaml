name: sikdanscan
description: "식단스캔 - AI 기반 식단 분석과 목표별 전략 코칭 앱"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Remote Backend
  supabase_flutter: ^2.15.2

  # Charts
  fl_chart: ^0.70.2

  # UI Components
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.17

  # Networking
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1

  # Utilities
  crypto: ^3.0.6
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4

  # Icons
  flutter_lucide: ^1.1.1
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/app/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#22C7A5"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png
  remove_alpha_ios: true
